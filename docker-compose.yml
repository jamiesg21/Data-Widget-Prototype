services:
  widget-api:
    build: .
    image: sr-widget-prototype
    container_name: sr-widget-api
    ports:
      - "8080:8080"
    environment:
      SR_PORT: "8080"
      SR_DEV_MODE: "1"   # Enables /_dev/phase endpoint for the example page demo
      SR_DEBUG: "0"
    restart: unless-stopped
